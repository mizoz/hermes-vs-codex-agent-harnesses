<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#263244"/></marker>
</defs>
<rect width="100%" height="100%" fill="url(#grid)"/>
<style>text { font-family: Inter, Geist, Arial, sans-serif; }</style>
