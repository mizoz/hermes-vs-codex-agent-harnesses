<rect x="1270" y="290" width="190" height="92" rx="18" fill="#111827" stroke="#38BDF8" stroke-width="3"/><text x="1365.0" y="345.0" text-anchor="middle" font-size="30" font-weight="700" fill="#F8FAFC">Metrics Summary</text>
<line x1="260" y1="336" x2="310" y2="336" stroke="#263244" stroke-width="5" marker-end="url(#arrow)"/>
<line x1="500" y1="336" x2="550" y2="336" stroke="#263244" stroke-width="5" marker-end="url(#arrow)"/>
