<rect x="790" y="290" width="190" height="92" rx="18" fill="#111827" stroke="#38BDF8" stroke-width="3"/><text x="885.0" y="345.0" text-anchor="middle" font-size="30" font-weight="700" fill="#F8FAFC">Outcome Check</text>
