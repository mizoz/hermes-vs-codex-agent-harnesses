<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img">
<title>Agent harness diagram</title>
<rect width="100%" height="100%" fill="#0B1020"/>
<defs>
<pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#111A2E" stroke-width="1"/></pattern>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#263244"/></marker>
</defs>
<rect width="100%" height="100%" fill="url(#grid)"/>
<style>text { font-family: Inter, Geist, Arial, sans-serif; }</style>
<text x="80" y="86" font-size="44" font-weight="700" fill="#F8FAFC">Agent Harness Architecture</text>
<rect x="70" y="260" width="190" height="92" rx="18" fill="#111827" stroke="#38BDF8" stroke-width="3"/><text x="165.0" y="315.0" text-anchor="middle" font-size="30" font-weight="700" fill="#F8FAFC">User Goal</text>
<rect x="320" y="260" width="190" height="92" rx="18" fill="#111827" stroke="#38BDF8" stroke-width="3"/><text x="415.0" y="315.0" text-anchor="middle" font-size="30" font-weight="700" fill="#F8FAFC">Agent Harness</text>
<rect x="590" y="260" width="190" height="92" rx="18" fill="#111827" stroke="#38BDF8" stroke-width="3"/><text x="685.0" y="315.0" text-anchor="middle" font-size="30" font-weight="700" fill="#F8FAFC">Planning Loop</text>
<rect x="860" y="260" width="190" height="92" rx="18" fill="#111827" stroke="#38BDF8" stroke-width="3"/><text x="955.0" y="315.0" text-anchor="middle" font-size="30" font-weight="700" fill="#F8FAFC">Tool Execution</text>
<rect x="1130" y="260" width="190" height="92" rx="18" fill="#111827" stroke="#38BDF8" stroke-width="3"/><text x="1225.0" y="315.0" text-anchor="middle" font-size="30" font-weight="700" fill="#F8FAFC">Verification</text>
<rect x="1380" y="260" width="190" height="92" rx="18" fill="#111827" stroke="#34D399" stroke-width="3"/><text x="1475.0" y="315.0" text-anchor="middle" font-size="30" font-weight="700" fill="#F8FAFC">Result</text>
<line x1="260" y1="306" x2="320" y2="306" stroke="#263244" stroke-width="5" marker-end="url(#arrow)"/>
<line x1="510" y1="306" x2="590" y2="306" stroke="#263244" stroke-width="5" marker-end="url(#arrow)"/>
<line x1="780" y1="306" x2="860" y2="306" stroke="#263244" stroke-width="5" marker-end="url(#arrow)"/>
<line x1="1050" y1="306" x2="1130" y2="306" stroke="#263244" stroke-width="5" marker-end="url(#arrow)"/>
<line x1="1320" y1="306" x2="1380" y2="306" stroke="#263244" stroke-width="5" marker-end="url(#arrow)"/>
<rect x="846" y="520" width="220" height="92" rx="18" fill="#111827" stroke="#FBBF24" stroke-width="3"/><text x="956.0" y="575.0" text-anchor="middle" font-size="30" font-weight="700" fill="#F8FAFC">Workspace</text>
<rect x="1106" y="520" width="260" height="92" rx="18" fill="#111827" stroke="#34D399" stroke-width="3"/><text x="1236.0" y="575.0" text-anchor="middle" font-size="30" font-weight="700" fill="#F8FAFC">Memory / Handoff</text>
<line x1="960" y1="352" x2="956" y2="520" stroke="#263244" stroke-width="5" marker-end="url(#arrow)"/>
<line x1="1230" y1="352" x2="1236" y2="520" stroke="#263244" stroke-width="5" marker-end="url(#arrow)"/>
</svg>
